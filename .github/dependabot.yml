---
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    labels:
      - dependencies
    open-pull-requests-limit: 3

  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
      semver-minor-days: 9
      semver-major-days: 11
    labels:
      - dependencies
    open-pull-requests-limit: 1
